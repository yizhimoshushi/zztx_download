<!DOCTYPE html>

    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; /* 深邃的夜空色 */
            color: #e0e0e0; /* 主文字颜色 */
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 10% 50%, rgba(40, 40, 60, 0.2) 0%, transparent 20%),
                radial-gradient(circle at 90% 20%, rgba(30, 30, 50, 0.2) 0%, transparent 20%);
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(to right, #8c9eff, #448aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 15px rgba(68, 138, 255, 0.3);
        }
        .subtitle {
            font-size: 1.2em;
            color: #a0a0a0;
        }

        /* Main Content Card */
        .main-content {
            background-color: #2d2d2d; /* 类似月球表面的深灰 */
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px;
            width: 100%;
            max-width: 800px;
            border: 1px solid #444;
            position: relative;
            overflow: hidden;
        }
        .main-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, #8c9eff, #448aff, #00bcd4);
        }

        /* Game Info Section */
        .game-info {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 30px;
        }
        .info-item {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-start;
        }
        .info-label {
            font-weight: bold;
            color: #8c9eff;
            min-width: 100px;
        }
        .info-value {
            flex: 1;
        }

        /* Screenshot Gallery */
        .screenshot-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 25px 0;
        }
        .screenshot {
            background-color: #3a3a3a;
            border-radius: 8px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #444;
            color: #666;
            font-style: italic;
            transition: transform 0.3s ease;
        }
        .screenshot:hover {
            transform: scale(1.03);
            border-color: #448aff;
        }

        /* Download Button */
        .download-section {
            text-align: center;
            margin-top: 20px;
        }
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #448aff, #00bcd4);
            color: white;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(68, 138, 255, 0.4);
            border: none;
            cursor: pointer;
        }
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(68, 138, 255, 0.6);
            background: linear-gradient(135deg, #539bff, #00c8e6);
        }
        .download-btn:active {
            transform: translateY(1px);
        }

        /* Footer */
        footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }
        .powered-by {
            margin-top: 10px;
            font-size: 0.8em;
        }
        .powered-by a {
            color: #448aff;
            text-decoration: none;
        }
        .powered-by a:hover {
            text-decoration: underline;
        }

        /* Decorative Elements */
        .crater {
            position: absolute;
            background-color: #222;
            border-radius: 50%;
            border: 1px solid #3a3a3a;
        }
        .crater:nth-child(1) { top: 10%; left: 15%; width: 20px; height: 20px; }
        .crater:nth-child(2) { top: 25%; right: 20%; width: 35px; height: 35px; }
        .crater:nth-child(3) { bottom: 15%; left: 25%; width: 15px; height: 15px; }
        .crater:nth-child(4) { bottom: 30%; right: 10%; width: 25px; height: 25px; }

    </style>
</head>
